<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Magnus Mob</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0e1a; overflow: hidden; overscroll-behavior: none; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
canvas { display: block; width: 100vw; height: 100dvh; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// === CONFIG ===
const CFG = {
  MOB_SPEED: 120,
  MOB_RADIUS: 9,
  MAX_MOBS: 30,
  CLUSTER_LAG: 0.13,
  BOSS_R: 92,
  BOSS_PULSE_AMP: 0.06,
  BOSS_PULSE_HZ: 2,
  CARD_DUR: 2.2,
  WIN_DUR: 3.2,
  SHAKE_GATE: 0.25,
  SHAKE_BOSS: 0.5,
  SHAKE_FINAL: 1.1,
  POOL: 400,
  LS_KEY: 'magnusMobBestLevel',
  GATE_TOP_YF: 0.3,
  GATE_BOT_YF: 0.70,
  GATE_HEIGHT: 40,
  // Bright Mob Control-style gradients
  GRAD: [
    ['#7c5cff','#3a1f9e'],
    ['#ff9966','#d6336c'],
    ['#43e97b','#0f9b8e'],
    ['#fa709a','#fee140'],
    ['#4facfe','#00f2fe'],
    ['#f093fb','#5f27cd'],
    ['#fad961','#f76b1c'],
    ['#ffd1ff','#7a5cff'],
  ],
  LEVELS: [
    { year:1968, title:'Magnus föds',                 boss:5,   photo:'Motiv(1).png' },
    { year:1974, title:'Första skoldagen',             boss:15,  photo:'Motiv(2).png' },
    { year:1985, title:'Tonåring med stora drömmar',   boss:40,  photo:'Motiv.png'    },
    { year:1990, title:'Studentexamen',                boss:80,  photo:'Motiv(3).png' },
    { year:1995, title:'Första riktiga jobbet',         boss:150, photo:'Motiv(1).png' },
    { year:2000, title:'Blir pappa',                   boss:300, photo:'Motiv(4).png' },
    { year:2010, title:'Bästa pappan i världen',       boss:600, photo:'Motiv(5).png' },
    { year:2026, title:'GRATTIS, PAPPA FYLLER 30!',   boss:30,  photo:'Motiv.png'    },
  ],
  // Gate color palette — colors are NOT bound to good/bad
  GATE_COLORS: [
    {fill:'#27ae60', glow:'#7bed9f'},
    {fill:'#c0392b', glow:'#ff6b6b'},
    {fill:'#2980b9', glow:'#54a0ff'},
    {fill:'#8e44ad', glow:'#a29bfe'},
    {fill:'#e67e22', glow:'#ffa502'},
    {fill:'#16a085', glow:'#5eead4'},
    {fill:'#d63384', glow:'#fd79a8'},
    {fill:'#f39c12', glow:'#ffe566'},
  ],
  CONFETTI: ['#FF6B6B','#FFE566','#54A0FF','#A8FF78','#FD79A8','#00CEC9','#ffffff','#F9CA24'],
};

// === LAYOUT ===
let W, H, laneW, laneX, FS;
function recalc() {
  W = window.innerWidth; H = window.innerHeight;
  laneW = Math.min(Math.floor(W * 0.82), 480);
  laneX = W / 2;
  FS = Math.min(W, H) / 22;
}
recalc();

// === STATE ===
const S = {
  phase: 'loading',
  lvl: 0,
  count: 1,
  spX: laneX,
  clX: laneX,
  hudSc: 1,
  mobs: [],
  gates: [],
  boss: null,
  floats: [],
  shakeT: 0, shakeX: 0, shakeY: 0,
  timer: 0,
  cwaves: 0,
  bestLvl: 0,
  time: 0,
  lastTs: 0,
  spawnAcc: 0,
  win: false,
};

// === IMAGE LOADING ===
const IMGS = {};
const IMG_FILES = ['Motiv.png','Motiv(1).png','Motiv(2).png','Motiv(3).png','Motiv(4).png','Motiv(5).png'];
let loadProg = 0;

function preload() {
  IMG_FILES.forEach(function(name) {
    var img = new Image();
    img.onload  = function() { IMGS[name] = img;  loadProg += 1 / IMG_FILES.length; };
    img.onerror = function() { IMGS[name] = null; loadProg += 1 / IMG_FILES.length; };
    img.src = 'images/' + name;
  });
}

// === CANVAS SETUP ===
var cv = document.getElementById('c');
var ctx = cv.getContext('2d');

function resize() {
  recalc();
  var dpr = window.devicePixelRatio || 1;
  cv.width  = Math.floor(W * dpr);
  cv.height = Math.floor(H * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (S.boss) { S.boss.x = laneX; S.boss.y = H * S.boss.yf; }
  S.gates.forEach(function(g) { g.x = laneX; g.y = H * g.yf; g.w = laneW - 10; });
  S.spX = clamp(S.spX); S.clX = clamp(S.clX);
}
window.addEventListener('resize', resize);

// === PARTICLE POOL ===
function Particle() { this.alive = false; }
Particle.prototype.init = function(x,y,vx,vy,col,life,sz,grav) {
  this.x=x; this.y=y; this.vx=vx; this.vy=vy;
  this.col=col; this.life=life; this.max=life;
  this.sz=sz; this.grav=grav||0;
  this.rot=Math.random()*Math.PI*2;
  this.rv=(Math.random()-.5)*10;
  this.alive=true;
};
Particle.prototype.tick = function(dt) {
  this.x+=this.vx*dt; this.y+=this.vy*dt;
  this.vy+=this.grav*dt*60; this.vx*=0.97;
  this.rot+=this.rv*dt; this.life-=dt;
  if (this.life<=0) this.alive=false;
};
var POOL = [];
for (var _pi=0; _pi<CFG.POOL; _pi++) POOL.push(new Particle());

// === ENTITIES ===
function Mob(clx, spawnY) {
  this.baseY = (spawnY !== undefined) ? spawnY : H * 0.88;
  this.ph = Math.random() * Math.PI * 2;
  this.wf = 2.5 + Math.random() * 1.5;
  this.ox = (Math.random() - 0.5) * 4;
  this.oy = (Math.random() - 0.5) * 4;
  this.x = clx + this.ox;
  this.y = this.baseY + this.oy;
}
Mob.prototype.tick = function(dt, clx, t) {
  this.baseY -= CFG.MOB_SPEED * dt;
  this.x = clx + this.ox + Math.sin(t * this.wf + this.ph) * 1.5;
  this.y = this.baseY + this.oy;
};

function Gate(yf, pair) {
  this.yf = yf; this.y = H * yf;
  this.x = laneX; this.w = laneW - 10; this.h = CFG.GATE_HEIGHT;
  var flip = Math.random() > 0.5;
  this.lm = flip ? pair.good : pair.bad;
  this.rm = flip ? pair.bad  : pair.good;
  this.lg = flip; // tracked for collision; NOT used for color
  // Colors are independent of good/bad — player must read the label
  var pool = CFG.GATE_COLORS.slice();
  var li = (Math.random()*pool.length)|0;
  this.lc = pool[li]; pool.splice(li,1);
  var ri = (Math.random()*pool.length)|0;
  this.rc = pool[ri];
  this.done = false;
}

function Boss(cfg) {
  this.yf = 0.13; this.y = H * this.yf; this.x = laneX;
  this.thr = cfg.boss; this.photo = cfg.photo; this.pulse = 1;
}
Boss.prototype.tick = function(t) {
  this.pulse = 1 + CFG.BOSS_PULSE_AMP * Math.sin(t * CFG.BOSS_PULSE_HZ);
};

function FloatTxt(x,y,txt,col) {
  this.x=x; this.y=y; this.txt=txt; this.col=col; this.a=1; this.t=1.2;
}
FloatTxt.prototype.tick = function(dt) {
  this.y -= 55*dt; this.t -= dt; this.a = Math.max(0, this.t/1.2);
};

// === HELPERS ===
function rrect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function fallbackFace(fx,fy,r) {
  ctx.fillStyle='#bbb';
  ctx.beginPath(); ctx.arc(fx,fy,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#444';
  ctx.beginPath(); ctx.arc(fx-r*.28,fy-r*.1,r*.13,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(fx+r*.28,fy-r*.1,r*.13,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#444'; ctx.lineWidth=r*.08;
  ctx.beginPath(); ctx.arc(fx,fy+r*.2,r*.3,.1,Math.PI-.1); ctx.stroke();
}

function circlePhoto(img,px,py,r,pulse) {
  var rp = r * (pulse || 1);
  ctx.save();
  ctx.beginPath(); ctx.arc(px,py,rp,0,Math.PI*2); ctx.clip();
  if (img) {
    var sz = Math.min(img.width, img.height);
    ctx.drawImage(img,(img.width-sz)/2,(img.height-sz)/2,sz,sz,px-rp,py-rp,rp*2,rp*2);
  } else { fallbackFace(px,py,rp); }
  ctx.restore();
  ctx.save();
  ctx.beginPath(); ctx.arc(px,py,rp+2,0,Math.PI*2);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.stroke();
  ctx.restore();
}

function applyMod(n,m) {
  if (m.type==='mul') return Math.ceil(n*m.val);
  if (m.type==='div') return Math.max(1,Math.floor(n/m.val));
  if (m.type==='add') return n+m.val;
  if (m.type==='sub') return Math.max(1,n-m.val);
  return n;
}

function clamp(x) {
  return Math.max(laneX-laneW/2+24, Math.min(laneX+laneW/2-24, x));
}

function burst(x,y,n,cols,spd,grav) {
  var k=0;
  for (var i=0; i<POOL.length&&k<n; i++) {
    if (!POOL[i].alive) {
      var a=Math.random()*Math.PI*2, s=spd*(0.4+Math.random()*.8);
      POOL[i].init(
        x+(Math.random()-.5)*30, y+(Math.random()-.5)*15,
        Math.cos(a)*s, Math.sin(a)*s-spd*.4,
        cols[0|Math.random()*cols.length],
        0.9+Math.random()*.6, 5+Math.random()*7, grav
      );
      k++;
    }
  }
}

function confetti(n) {
  var cols=CFG.CONFETTI, k=0;
  for (var i=0; i<POOL.length&&k<n; i++) {
    if (!POOL[i].alive) {
      POOL[i].init(
        laneX+(Math.random()-.5)*laneW*.9, H*.1+Math.random()*H*.35,
        (Math.random()-.5)*180, -60-Math.random()*120,
        cols[0|Math.random()*cols.length],
        1.5+Math.random()*1.5, 7+Math.random()*9, 0.25
      );
      k++;
    }
  }
}

function wrapText(txt,x,y,maxW,lh) {
  var words=txt.split(' '), lines=[], line='';
  for (var i=0; i<words.length; i++) {
    var w=words[i], test=line?line+' '+w:w;
    if (ctx.measureText(test).width>maxW&&line) { lines.push(line); line=w; }
    else line=test;
  }
  if (line) lines.push(line);
  var sy=y-(lines.length-1)*lh/2;
  for (var j=0; j<lines.length; j++) ctx.fillText(lines[j],x,sy+j*lh);
}

function separateMobs() {
  var mobs=S.mobs, n=mobs.length;
  if (n<2) return;
  var minD=CFG.MOB_RADIUS*2+2;
  for (var it=0; it<3; it++) {
    for (var i=0; i<n-1; i++) {
      for (var j=i+1; j<n; j++) {
        var dx=mobs[i].x-mobs[j].x;
        var dy=mobs[i].y-mobs[j].y;
        var d2=dx*dx+dy*dy;
        if (d2<minD*minD&&d2>0.01) {
          var d=Math.sqrt(d2);
          var push=(minD-d)*0.5;
          var nx=dx/d*push, ny=dy/d*push;
          mobs[i].ox+=nx; mobs[j].ox-=nx;
          mobs[i].oy+=ny; mobs[j].oy-=ny;
          mobs[i].x+=nx; mobs[j].x-=nx;
          mobs[i].y+=ny; mobs[j].y-=ny;
        }
      }
    }
  }
  for (var k=0; k<n; k++) {
    mobs[k].ox*=0.93;
    mobs[k].oy*=0.97;
  }
}

// === LEVEL GENERATION ===
function generateGates(boss, lvlIdx) {
  var n;
  if (lvlIdx < 2) n = 3;
  else if (lvlIdx < 6) n = 4;
  else n = 5;

  var goodPool = [
    {type:'mul', val:2,  label:'×2'},
    {type:'mul', val:3,  label:'×3'},
    {type:'mul', val:4,  label:'×4'},
    {type:'mul', val:5,  label:'×5'},
    {type:'add', val:5,  label:'+5'},
    {type:'add', val:10, label:'+10'},
    {type:'add', val:20, label:'+20'},
    {type:'add', val:50, label:'+50'},
  ];
  var badPool = [
    {type:'sub', val:1,  label:'-1'},
    {type:'sub', val:2,  label:'-2'},
    {type:'sub', val:5,  label:'-5'},
    {type:'sub', val:10, label:'-10'},
    {type:'sub', val:20, label:'-20'},
    {type:'div', val:2,  label:'÷2'},
    {type:'div', val:3,  label:'÷3'},
    {type:'div', val:5,  label:'÷5'},
  ];

  function simBest(gates) {
    var v = 1;
    for (var i=0;i<gates.length;i++) v = applyMod(v, gates[i].good);
    return v;
  }

  for (var attempt=0; attempt<120; attempt++) {
    var gates = [];
    for (var i=0;i<n;i++) {
      var g = goodPool[(Math.random()*goodPool.length)|0];
      var b = badPool[(Math.random()*badPool.length)|0];
      gates.push({good:g, bad:b});
    }
    var bestV = simBest(gates);
    if (bestV >= boss * 1.15 && bestV <= boss * 12) return gates;
  }

  // Guaranteed-winnable fallback if random search ran out of attempts
  var fallback = [];
  for (var k=0;k<n-1;k++) fallback.push({
    good:{type:'mul',val:3,label:'×3'},
    bad: {type:'sub',val:1,label:'-1'},
  });
  var fv = Math.pow(3, n-1);
  var needed = Math.max(2, Math.ceil(boss * 1.3 / fv));
  fallback.push({
    good:{type:'mul',val:needed,label:'×'+needed},
    bad: {type:'div',val:2,label:'÷2'},
  });
  return fallback;
}

// === INPUT ===
var drag=false;

cv.addEventListener('pointerdown', function(e) {
  drag=true;
  var px=e.clientX;
  if (S.phase==='playing'||S.phase==='boss_resolve') S.spX=clamp(px);
  if (S.phase==='title')        { startGame(); return; }
  if (S.phase==='levelcard')    { S.timer=0;   return; }
  if (S.phase==='gameover')     { retry();     return; }
  if (S.phase==='game_victory') { goTitle();   return; }
});
cv.addEventListener('pointermove', function(e) {
  if (!drag) return;
  if (S.phase==='playing'||S.phase==='boss_resolve') S.spX=clamp(e.clientX);
});
cv.addEventListener('pointerup',     function(){drag=false;});
cv.addEventListener('pointercancel', function(){drag=false;});

// === GAME FLOW ===
function visibleMobTarget() {
  return Math.min(S.count, 40);
}

function gateYFracs(n) {
  var top=CFG.GATE_TOP_YF, bot=CFG.GATE_BOT_YF, out=[];
  for (var i=0; i<n; i++) out.push(bot-(i/(n-1||1))*(bot-top));
  return out;
}

function initLevel(idx) {
  S.lvl=idx; S.count=1;
  S.mobs=[]; S.gates=[]; S.floats=[];
  for (var i=0;i<POOL.length;i++) POOL[i].alive=false;
  S.shakeT=0; S.cwaves=0; S.spawnAcc=0; S.win=false; S.hudSc=1;
  S.spX=laneX; S.clX=laneX;

  var levelGates=generateGates(CFG.LEVELS[idx].boss, idx);
  var yfs=gateYFracs(levelGates.length);
  for (var j=0;j<levelGates.length;j++) S.gates.push(new Gate(yfs[j],levelGates[j]));
  S.boss=new Boss(CFG.LEVELS[idx]);
  S.phase='levelcard'; S.timer=CFG.CARD_DUR;

  S.mobs.push(new Mob(laneX));
}

function startGame() {
  S.bestLvl=parseInt(localStorage.getItem(CFG.LS_KEY)||'0');
  initLevel(0);
}

function retry() { initLevel(S.lvl); }

function goTitle() { S.phase='title'; }

function nextLevel() {
  var next=S.lvl+1;
  if (next>S.bestLvl) { S.bestLvl=next; localStorage.setItem(CFG.LS_KEY,String(next)); }
  if (next>=CFG.LEVELS.length) S.phase='game_victory';
  else initLevel(next);
}

// === UPDATE ===
function update(dt) {
  S.time+=dt;

  if (S.shakeT>0) {
    S.shakeT-=dt;
    var i=S.shakeT*10;
    S.shakeX=(Math.random()-.5)*i; S.shakeY=(Math.random()-.5)*i;
  } else { S.shakeX=0; S.shakeY=0; }

  if (S.hudSc>1) S.hudSc=Math.max(1,S.hudSc-dt*4);

  for (var pi=0;pi<POOL.length;pi++) if(POOL[pi].alive) POOL[pi].tick(dt);
  for (var fi=0;fi<S.floats.length;fi++) S.floats[fi].tick(dt);
  S.floats=S.floats.filter(function(f){return f.t>0;});

  if (S.phase==='loading') {
    if (loadProg>=0.9999) { S.phase='title'; S.time=0; }
    return;
  }
  if (S.phase==='levelcard') {
    S.timer-=dt; if(S.timer<=0) S.phase='playing'; return;
  }
  if (S.phase==='level_victory') {
    S.timer-=dt;
    if (S.lvl===7) {
      var el=CFG.WIN_DUR-S.timer;
      if (el>1&&S.cwaves<1) { confetti(130); S.cwaves=1; }
      if (el>2&&S.cwaves<2) { confetti(130); S.cwaves=2; }
    }
    if (S.timer<=0) nextLevel();
    return;
  }
  if (S.phase==='boss_resolve') {
    S.timer-=dt;
    if (S.timer<=0) {
      if (S.win) {
        S.phase='level_victory'; S.timer=CFG.WIN_DUR;
        confetti(S.lvl===7?180:80);
        if (S.lvl===7) S.shakeT=CFG.SHAKE_FINAL;
      } else { S.phase='gameover'; }
    }
    return;
  }
  if (S.phase!=='playing') return;

  if (S.boss) S.boss.tick(S.time);

  var vmTarget=visibleMobTarget();
  while (S.mobs.length>vmTarget) S.mobs.pop();

  S.clX+=(S.spX-S.clX)*CFG.CLUSTER_LAG;

  for (var mi=0;mi<S.mobs.length;mi++) S.mobs[mi].tick(dt,S.clX,S.time);
  S.mobs=S.mobs.filter(function(m){return m.baseY>-CFG.MOB_RADIUS*4;});
  separateMobs();

  var leadY=H;
  for (var li=0;li<S.mobs.length;li++) if(S.mobs[li].y<leadY) leadY=S.mobs[li].y;

  for (var gi=0;gi<S.gates.length;gi++) {
    var g=S.gates[gi];
    if (g.done||leadY>g.y+g.h/2) continue;
    g.done=true;
    var left=S.clX<g.x;
    var mod=left?g.lm:g.rm;
    var good=left?g.lg:!g.lg;
    var oldVis=Math.min(S.count,40);
    S.count=applyMod(S.count,mod);
    S.hudSc=1.45;
    var newVis=Math.min(S.count,40);
    var delta=newVis-oldVis;
    if (delta>0) {
      for (var a=0;a<delta;a++) S.mobs.push(new Mob(S.clX,g.y));
    } else if (delta<0) {
      for (var b=0;b<-delta&&S.mobs.length>0;b++) S.mobs.pop();
    }
    var cols=good?['#A8FF78','#FFE566','#fff','#54A0FF']:['#FF6B6B','#FD79A8','#EE5A24','#fff'];
    burst(g.x,g.y,28,cols,220,0);
    S.floats.push(new FloatTxt(g.x,g.y-36,mod.label,good?'#A8FF78':'#FF6B6B'));
    S.shakeT=Math.max(S.shakeT,CFG.SHAKE_GATE);
  }

  if (S.boss&&leadY<S.boss.y+CFG.BOSS_R*.7) {
    S.phase='boss_resolve'; S.timer=0.85;
    S.win=S.count>=S.boss.thr;
    S.shakeT=S.lvl===7?CFG.SHAKE_FINAL:CFG.SHAKE_BOSS;
    S.mobs=[];
  }
}

// === RENDER ===
function render() {
  ctx.clearRect(0,0,W,H);
  ctx.save();
  ctx.translate(S.shakeX,S.shakeY);
  drawBG();
  drawLane();
  if (S.boss&&S.phase!=='loading'&&S.phase!=='title') drawBoss();
  drawGates();
  drawMobs();
  if (S.phase==='playing'||S.phase==='boss_resolve') drawSpawner();
  drawParticles();
  drawFloats();
  ctx.restore();
  drawHUD();
  drawOverlay();
}

function drawBG() {
  var gr=CFG.GRAD[S.lvl]||CFG.GRAD[0];
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,gr[0]); g.addColorStop(1,gr[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Vignette for depth
  var vg=ctx.createRadialGradient(W/2,H*0.45,Math.min(W,H)*0.25,W/2,H*0.55,Math.max(W,H)*0.8);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.42)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  // Soft drifting sparkles
  ctx.fillStyle='rgba(255,255,255,0.35)';
  for (var i=0;i<24;i++) {
    var sx=((i*97 + S.time*12) % (W+40)) - 20;
    var sy=((i*53 + S.time*18) % (H+40)) - 20;
    var s=1+(i%3);
    ctx.fillRect(sx,sy,s,s);
  }
}

function drawLane() {
  var lx=laneX-laneW/2;
  // Base shaded lane
  var bg=ctx.createLinearGradient(lx,0,lx+laneW,0);
  bg.addColorStop(0,'rgba(0,0,0,0.32)');
  bg.addColorStop(0.5,'rgba(0,0,0,0.16)');
  bg.addColorStop(1,'rgba(0,0,0,0.32)');
  ctx.fillStyle=bg; ctx.fillRect(lx,0,laneW,H);

  // Glowing side rails
  var rl=ctx.createLinearGradient(lx-14,0,lx+14,0);
  rl.addColorStop(0,'rgba(255,255,255,0)');
  rl.addColorStop(0.5,'rgba(255,255,255,0.6)');
  rl.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=rl; ctx.fillRect(lx-14,0,28,H);
  var rr=ctx.createLinearGradient(lx+laneW-14,0,lx+laneW+14,0);
  rr.addColorStop(0,'rgba(255,255,255,0)');
  rr.addColorStop(0.5,'rgba(255,255,255,0.6)');
  rr.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=rr; ctx.fillRect(lx+laneW-14,0,28,H);

  // Scrolling center dashes for forward motion
  var sp=80, off=(S.time*120)%sp;
  ctx.fillStyle='rgba(255,255,255,0.22)';
  for (var y=off-sp; y<H+sp; y+=sp) {
    ctx.fillRect(laneX-3, y, 6, sp*0.42);
  }
}

function drawGates() {
  for (var i=0;i<S.gates.length;i++) {
    var g=S.gates[i];
    if (g.done) continue;
    var gx=g.x-g.w/2, gy=g.y-g.h/2, hw=(g.w-6)/2;

    drawGateHalf(gx,       gy, hw, g.h, g.lc);
    drawGateHalf(gx+hw+6,  gy, hw, g.h, g.rc);

    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.font='900 '+Math.round(FS*1.25)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    var qw=g.w/4;
    ctx.fillText(g.lm.label, g.x-qw+1.5, g.y+1.5);
    ctx.fillText(g.rm.label, g.x+qw+1.5, g.y+1.5);
    ctx.fillStyle='#fff';
    ctx.fillText(g.lm.label, g.x-qw, g.y);
    ctx.fillText(g.rm.label, g.x+qw, g.y);
  }
}

function drawGateHalf(x,y,w,h,col) {
  // Neon glow
  ctx.save();
  ctx.shadowColor=col.glow;
  ctx.shadowBlur=22;
  ctx.fillStyle=col.fill;
  rrect(x,y,w,h,12); ctx.fill();
  ctx.restore();
  // Top highlight
  var hg=ctx.createLinearGradient(x,y,x,y+h);
  hg.addColorStop(0,'rgba(255,255,255,0.4)');
  hg.addColorStop(0.45,'rgba(255,255,255,0)');
  ctx.fillStyle=hg;
  rrect(x,y,w,h,12); ctx.fill();
  // Bottom shadow band
  var sh=ctx.createLinearGradient(x,y+h*0.55,x,y+h);
  sh.addColorStop(0,'rgba(0,0,0,0)');
  sh.addColorStop(1,'rgba(0,0,0,0.28)');
  ctx.fillStyle=sh;
  rrect(x,y,w,h,12); ctx.fill();
  // Outline
  ctx.strokeStyle=col.glow;
  ctx.lineWidth=2.5;
  rrect(x,y,w,h,12); ctx.stroke();
}

function drawBoss() {
  var b=S.boss, img=IMGS[b.photo];
  // Glow halo
  var ringR=CFG.BOSS_R*b.pulse;
  var rg=ctx.createRadialGradient(b.x,b.y,ringR*0.85,b.x,b.y,ringR+38);
  rg.addColorStop(0,'rgba(255,255,255,0.45)');
  rg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=rg;
  ctx.beginPath(); ctx.arc(b.x,b.y,ringR+38,0,Math.PI*2); ctx.fill();

  circlePhoto(img,b.x,b.y,CFG.BOSS_R,b.pulse);

  // Threshold pill badge
  var py=b.y+CFG.BOSS_R*0.62;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.6)';
  ctx.shadowBlur=10; ctx.shadowOffsetY=3;
  ctx.fillStyle='#15172b';
  rrect(b.x-58,py-20,116,40,20); ctx.fill();
  ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,0.55)';
  ctx.lineWidth=2;
  rrect(b.x-58,py-20,116,40,20); ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.font='900 '+Math.round(FS*1.3)+'px system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(b.thr,b.x,py);
}

function drawMobs() {
  var img=IMGS[CFG.LEVELS[S.lvl].photo];
  // Ground shadows pass
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.32)';
  for (var i=0;i<S.mobs.length;i++) {
    var m=S.mobs[i];
    ctx.beginPath();
    ctx.ellipse(m.x, m.y+CFG.MOB_RADIUS*0.95, CFG.MOB_RADIUS*0.85, CFG.MOB_RADIUS*0.28, 0, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
  // Mobs
  for (var j=0;j<S.mobs.length;j++) circlePhoto(img,S.mobs[j].x,S.mobs[j].y,CFG.MOB_RADIUS,1);
}

function drawSpawner() {
  var sy=H*0.88, r=Math.min(W,H)*0.04;
  var p=1+0.12*Math.sin(S.time*4);
  var c1=CFG.GRAD[S.lvl][0];
  // Glow halo
  var gh=ctx.createRadialGradient(S.spX,sy,0,S.spX,sy,r*3.2);
  gh.addColorStop(0,'rgba(255,255,255,0.5)');
  gh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=gh;
  ctx.beginPath(); ctx.arc(S.spX,sy,r*3.2,0,Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle='rgba(255,255,255,0.97)';
  ctx.beginPath(); ctx.arc(S.spX,sy,r*p,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=c1; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(S.spX,sy,r*p,0,Math.PI*2); ctx.stroke();
  // Arrow up
  ctx.fillStyle=c1;
  ctx.beginPath();
  ctx.moveTo(S.spX, sy-r*1.55*p);
  ctx.lineTo(S.spX-r*0.6, sy-r*0.85*p);
  ctx.lineTo(S.spX+r*0.6, sy-r*0.85*p);
  ctx.closePath(); ctx.fill();
}

function drawParticles() {
  for (var i=0;i<POOL.length;i++) {
    var p=POOL[i];
    if (!p.alive) continue;
    var a=Math.max(0,p.life/p.max);
    ctx.save();
    ctx.globalAlpha=a;
    ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=p.col;
    ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz);
    ctx.restore();
  }
}

function drawFloats() {
  for (var i=0;i<S.floats.length;i++) {
    var f=S.floats[i];
    ctx.save();
    ctx.globalAlpha=f.a;
    ctx.font='900 '+Math.round(FS*1.7)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.fillText(f.txt,f.x+2,f.y+2);
    ctx.fillStyle=f.col;
    ctx.fillText(f.txt,f.x,f.y);
    ctx.restore();
  }
}

function drawHUD() {
  var ph=S.phase;
  if (ph!=='playing'&&ph!=='boss_resolve'&&ph!=='level_victory') return;
  var sc=S.hudSc;
  ctx.save();
  ctx.translate(W/2,H*0.058);
  ctx.scale(sc,sc);
  var digits=String(S.count).length;
  var bw=Math.max(FS*4.2, digits*FS*1.85+FS*2.6);
  var bh=FS*2.4;
  // Drop shadow
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.55)';
  ctx.shadowBlur=18; ctx.shadowOffsetY=5;
  ctx.fillStyle='#15172b';
  rrect(-bw/2 + 500,-bh/2 + 100,bw,bh,bh/2); ctx.fill();
  ctx.restore();
  // Inner highlight
  var hg=ctx.createLinearGradient(0,-bh/2,0,0);
  hg.addColorStop(0,'rgba(255,255,255,0.3)');
  hg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=hg;
  rrect(-bw/2 + 500,-bh/2 + 100,bw,bh*0.55,bh/2); ctx.fill();
  // Border
  ctx.strokeStyle='rgba(255,255,255,0.7)';
  ctx.lineWidth=2.5;
  rrect(-bw/2 + 500,-bh/2 + 100,bw,bh,bh/2); ctx.stroke();
  // Count
  ctx.font='900 '+Math.round(FS*1.85)+'px system-ui,sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#fff';
  ctx.fillText(S.count,500,100);
  ctx.restore();

  // Level/year corner badge
  var lx=laneX-laneW/2+8;
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.font='bold '+Math.round(FS*0.78)+'px system-ui,sans-serif';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('Nivå '+(S.lvl+1)+'/8', lx, H*0.012);
  ctx.fillStyle='rgba(255,255,255,0.65)';
  ctx.font=Math.round(FS*0.7)+'px system-ui,sans-serif';
  ctx.fillText(String(CFG.LEVELS[S.lvl].year), lx, H*0.012+FS*0.95);
}

function drawOverlay() {
  var ph=S.phase;

  if (ph==='loading') {
    ctx.fillStyle='rgba(0,0,0,0.84)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';
    ctx.font='bold '+Math.round(FS*1.8)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    var dots='.'.repeat((0|S.time*2)%4);
    ctx.fillText('Laddar Magnus'+dots,W/2,H/2-FS*2.2);
    var bw=Math.min(W*.7,320), bh=FS*.85, bx=W/2-bw/2, by=H/2;
    ctx.fillStyle='rgba(255,255,255,0.18)';
    rrect(bx,by,bw,bh,bh/2); ctx.fill();
    ctx.fillStyle='#FFE566';
    rrect(bx,by,Math.max(bh,bw*loadProg),bh,bh/2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.font=Math.round(FS*.72)+'px system-ui,sans-serif';
    ctx.fillText(Math.round(loadProg*100)+'%',W/2,by+FS*1.65);
    return;
  }

  if (ph==='title') {
    ctx.fillStyle='rgba(0,0,0,0.58)';
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.65)';
    ctx.shadowBlur=16; ctx.shadowOffsetY=5;
    var tg=ctx.createLinearGradient(0,H*.3,0,H*.52);
    tg.addColorStop(0,'#FFE566'); tg.addColorStop(1,'#FD79A8');
    ctx.fillStyle=tg;
    ctx.font='900 '+Math.round(FS*3.2)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('MAGNUS MOB',W/2,H*.38);
    ctx.restore();
    ctx.fillStyle='#fff';
    ctx.font='bold '+Math.round(FS*1.05)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('(Pappas favoritspel)',W/2,H*.50);
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.font=Math.round(FS*.8)+'px system-ui,sans-serif';
    ctx.fillText('Dra vänster/höger för att styra mobben',W/2,H*.60);
    if ((0|S.time*2)%2===0) {
      ctx.save();
      ctx.shadowColor='rgba(0,0,0,0.5)';
      ctx.shadowBlur=10; ctx.shadowOffsetY=3;
      ctx.fillStyle='#FFE566';
      ctx.font='900 '+Math.round(FS*1.1)+'px system-ui,sans-serif';
      ctx.fillText('TRYCK FÖR ATT STARTA',W/2,H*.73);
      ctx.restore();
    }
    if (S.bestLvl>0) {
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.font=Math.round(FS*.68)+'px system-ui,sans-serif';
      ctx.fillText('Bästa nivå: '+S.bestLvl+'/8',W/2,H*.83);
    }
    return;
  }

  if (ph==='levelcard') {
    var t=1-S.timer/CFG.CARD_DUR;
    var a=t<.1?t/.1:t>.85?(1-t)/.15:1;
    ctx.fillStyle='rgba(0,0,0,'+(.72*a)+')';
    ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.globalAlpha=a;
    ctx.fillStyle='#FFE566';
    ctx.font='900 '+Math.round(FS*4.6)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(CFG.LEVELS[S.lvl].year),W/2,H*.42);
    ctx.fillStyle='#fff';
    ctx.font='bold '+Math.round(FS*1.05)+'px system-ui,sans-serif';
    wrapText(CFG.LEVELS[S.lvl].title, W/2, H*.55, laneW*0.92, FS*1.3);
    ctx.restore();
    return;
  }

  if (ph==='boss_resolve') {
    if (S.lvl===7) {
      var pp=1+.08*Math.sin(S.time*9);
      ctx.save(); ctx.globalAlpha=.92;
      ctx.font='900 '+Math.round(FS*1.6*pp)+'px system-ui,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='rgba(0,0,0,0.4)';
      ctx.fillText('DEN SLUTGILTIGA BOSSEN!',W/2+2,H*.33+2);
      ctx.fillStyle='#FFE566';
      ctx.fillText('DEN SLUTGILTIGA BOSSEN!',W/2,H*.33);
      ctx.restore();
    }
    return;
  }

  if (ph==='level_victory') {
    ctx.fillStyle='rgba(0,0,0,0.38)';
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.55)';
    ctx.shadowBlur=14; ctx.shadowOffsetY=4;
    ctx.fillStyle='#A8FF78';
    ctx.font='900 '+Math.round(FS*2.8)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('NIVÅ KLAR!',W/2,H*.42);
    ctx.restore();
    ctx.fillStyle='#fff';
    ctx.font='bold '+Math.round(FS*1.0)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Mobbar: '+S.count,W/2,H*.54);
    return;
  }

  if (ph==='gameover') {
    ctx.fillStyle='rgba(0,0,0,0.74)';
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.55)';
    ctx.shadowBlur=14; ctx.shadowOffsetY=4;
    ctx.fillStyle='#FF6B6B';
    ctx.font='900 '+Math.round(FS*3)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('GAME OVER',W/2,H*.34);
    ctx.restore();
    ctx.fillStyle='#fff';
    ctx.font='bold '+Math.round(FS*.95)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Du behövde '+CFG.LEVELS[S.lvl].boss+' mobbar',W/2,H*.47);
    ctx.fillText('Du hade '+S.count,W/2,H*.55);
    var rbw=laneW*.65, rbh=FS*2.4, rbx=W/2-rbw/2, rby=H*.67;
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.45)';
    ctx.shadowBlur=14; ctx.shadowOffsetY=4;
    ctx.fillStyle='#FFE566';
    rrect(rbx,rby,rbw,rbh,rbh/2); ctx.fill();
    ctx.restore();
    ctx.fillStyle='#000';
    ctx.font='900 '+Math.round(FS*1.1)+'px system-ui,sans-serif';
    ctx.fillText('FÖRSÖK IGEN',W/2,rby+rbh/2);
    return;
  }

  if (ph==='game_victory') {
    ctx.fillStyle='rgba(0,0,0,0.7)';
    ctx.fillRect(0,0,W,H);
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.55)';
    ctx.shadowBlur=14; ctx.shadowOffsetY=4;
    ctx.fillStyle='#FFE566';
    ctx.font='900 '+Math.round(FS*2.4)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('GRATTIS MAGNUS!',W/2,H*.12);
    ctx.restore();
    var vr=Math.min(W,H)*.21;
    circlePhoto(IMGS['Motiv(5).png'],W/2,H*.44,vr,1);
    ctx.fillStyle='#fff';
    ctx.font='bold '+Math.round(FS*1.05)+'px system-ui,sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('Du klarade det!',W/2,H*.72);
    ctx.font='bold '+Math.round(FS*.9)+'px system-ui,sans-serif';
    ctx.fillText('YAY, grattis på 30 årsdagen!',W/2,H*.80);
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.font=Math.round(FS*.68)+'px system-ui,sans-serif';
    ctx.fillText('Tryck för att spela igen',W/2,H*.91);
    return;
  }
}

// === MAIN LOOP ===
function loop(ts) {
  if (!S.lastTs) S.lastTs=ts;
  var dt=Math.min((ts-S.lastTs)/1000,.05);
  S.lastTs=ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// === INIT ===
resize();
S.bestLvl=parseInt(localStorage.getItem(CFG.LS_KEY)||'0');
preload();
requestAnimationFrame(loop);
</script>
